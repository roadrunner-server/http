version: '3'

server:
  command: "php php_test_files/http/client.php echo pipes"
  relay: "pipes"
  relay_timeout: "20s"

http:
  address: 127.0.0.1:19099
  max_request_size: 1024
  middleware: []
  proxy:
    address: 127.0.0.1:7077
    request_timeout: 30s
    inbox_size: 16
  pool:
    num_workers: 1
    allocate_timeout: 60s
    destroy_timeout: 1s

logs:
  mode: development
  level: debug
  encoding: console
